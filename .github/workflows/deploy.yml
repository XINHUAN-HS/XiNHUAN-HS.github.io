name: 自动构建并部署

# 触发条件：当向 main 分支推送代码，或者手动触发时运行
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 运行环境

    steps:
      # 1. 检出仓库代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置 Python 环境（因为你的脚本是 .py）
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' # 使用最新的 Python 3

      # 3. 安装依赖并运行脚本
      # 这一步会自动扫描 article 文件夹并更新 articles.json
      - name: 生成文章索引
        run: |
          python create_article.py

      # 4. 部署到 GitHub Pages
      # 将所有文件（包含新生成的 articles.json）推送到 gh-pages 分支
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./
          force_orphan: true
