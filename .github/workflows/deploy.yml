name: 自动构建并部署

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 生成文章索引
        run: |
          python create_article.py

      - name: 验证 articles.json 存在
        run: |
          if [ ! -f articles.json ]; then
            echo "❌ articles.json 未生成！"
            exit 1
          fi
          echo "✅ articles.json 已生成，大小：$(wc -c < articles.json) 字节"

      - name: 部署到 GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 关键修复：先强制重置工作区，丢弃所有未提交的更改（包括可能的手动修改）
          git reset --hard HEAD

          # 再拉取远程最新代码
          git pull origin main --rebase

          # 添加 .nojekyll 和 articles.json
          touch .nojekyll
          git add articles.json .nojekyll

          # 只在有变更时提交和推送
          if ! git diff --cached --quiet; then
            git commit -m "chore: update articles.json [skip ci]"
            
            # 最多重试 3 次推送
            for i in {1..3}; do
              if git push origin main; then
                echo "✅ 推送成功"
                break
              else
                echo "⚠️ 推送失败，尝试拉取最新代码后重试（第 ${i} 次）"
                git pull origin main --rebase
              fi
            done
          else
            echo "✅ 没有文件变更，无需提交。"
          fi
