<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ★ 修改此处：文章标题（显示在浏览器标签页） -->
    <title>文章标题</title>
    <style>
        /* ========== 全局基础样式（可保留） ========== */
        body {
            background: #0a0e1a;
            color: #c8d6ff;
            font-family: 'Segoe UI', sans-serif;
            padding: 30px 40px;
            line-height: 1.8;
            max-width: 820px;
            margin: 0 auto;
            overflow-y: auto;          /* 允许垂直滚动 */
            overflow-x: hidden;        /* 隐藏水平滚动条 */
        }

        /* ========== 隐藏滚动条（必须保留） ========== */
        html {
            scrollbar-width: none;        /* Firefox */
            -ms-overflow-style: none;     /* IE/Edge 旧版 */
        }
        html::-webkit-scrollbar {
            display: none;                /* Chrome/Safari/Edge 新版 */
        }

        /* ========== 标题区（日期自动显示在右侧） ========== */
        h1 { 
            color: #7aa9ff; 
            border-bottom: 1px solid rgba(140,180,255,0.2); 
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
        }
        h1 .pub-date {
            font-size: 0.55em;
            font-weight: normal;
            opacity: 0.5;
            white-space: nowrap;
        }

        /* ========== 二级标题 ========== */
        h2 { 
            color: #8ab4ff; 
            margin-top: 30px; 
        }
        h3 { 
            color: #9bc0ff; 
            margin-top: 20px; 
        }

        /* ========== 代码样式 ========== */
        code { 
            background: rgba(140,180,255,0.1); 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 0.9em; 
        }
        pre { 
            background: rgba(10,14,30,0.6); 
            border: 1px solid rgba(140,180,255,0.1); 
            border-radius: 10px; 
            padding: 16px; 
            overflow-x: auto; 
            font-size: 0.9em;
        }

        /* ========== 列表 ========== */
        ul, ol { 
            padding-left: 20px; 
        }
        li { 
            margin: 6px 0; 
        }

        /* ========== 引用块 / 提示框 ========== */
        blockquote {
            border-left: 3px solid rgba(140,180,255,0.3);
            margin: 20px 0;
            padding: 10px 20px;
            background: rgba(140,180,255,0.04);
            color: rgba(200,214,255,0.75);
        }
        .note {
            background: rgba(255,204,102,0.08);
            border-left: 3px solid #ffcc66;
            padding: 12px 16px;
            border-radius: 6px;
            margin: 20px 0;
        }
        .warning {
            background: rgba(255,100,100,0.08);
            border-left: 3px solid #ff6464;
            padding: 12px 16px;
            border-radius: 6px;
            margin: 20px 0;
        }
        .tip {
            background: rgba(100,255,150,0.08);
            border-left: 3px solid #64ff96;
            padding: 12px 16px;
            border-radius: 6px;
            margin: 20px 0;
        }

        /* ========== 链接 ========== */
        a {
            color: #8ab4ff;
        }
        a:hover {
            color: #aaccff;
        }

        /* ========== 表格（可选） ========== */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid rgba(140,180,255,0.15);
            padding: 10px 14px;
            text-align: left;
        }
        th {
            background: rgba(140,180,255,0.08);
            color: #8ab4ff;
        }

        /* ========== 图片（可选） ========== */
        img {
            max-width: 100%;
            border-radius: 8px;
            margin: 20px 0;
        }

        /* ========== 响应式适配 ========== */
        @media (max-width: 640px) {
            body {
                padding: 20px 16px;
            }
            h1 {
                font-size: 1.4em;
            }
            h1 .pub-date {
                font-size: 0.5em;
            }
        }
    </style>
</head>
<body>

    <!-- ★ 修改此处：文章主标题 + 发布日期 -->
    <h1>
        <span>🐍 文章主标题</span>
        <span class="pub-date">— 2007-01-20</span>
    </h1>

    <!-- ★ 文章导语（可选） -->
    <p>这里是文章的简要介绍或引言，可以写一两句话概括全文内容。</p>

    <!-- ★ 正文开始，按需使用 h2/h3、p、pre、ul、blockquote、.note 等 -->

    <h2>1. 第一节标题</h2>
    <p>正文内容……</p>

    <h3>1.1 子节标题</h3>
    <p>更详细的描述。</p>

    <pre><code># 示例代码
console.log("Hello, world!");</code></pre>

    <ul>
        <li>要点一</li>
        <li>要点二</li>
    </ul>

    <div class="note">
        <strong>💡 提示：</strong>这是一个温馨提示框。
    </div>

    <div class="warning">
        <strong>⚠️ 注意：</strong>这是一个警告框。
    </div>

    <div class="tip">
        <strong>✅ 最佳实践：</strong>这是一个技巧建议框。
    </div>

    <blockquote>
        这是一段引用文字，可以用来放置名言或重要说明。
    </blockquote>

    <h2>2. 第二节标题</h2>
    <p>继续编写内容……</p>

    <!-- 如果需要表格 -->
    <table>
        <thead>
            <tr>
                <th>名称</th>
                <th>说明</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>示例</td>
                <td>这是示例数据</td>
            </tr>
        </tbody>
    </table>

    <!-- ★ 底部无需再写日期，已放在标题旁 -->
</body>
</html>
