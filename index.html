<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>心 · 幻</title>
   <link rel="icon" href="./ico.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- 宇宙主题背景层（恒星太阳、银河光带、星系） -->
    <div id="universe-theme-layer"></div>

    <!-- 星空画布 -->
    <canvas id="starfield"></canvas>

    <!-- 太阳系行星点缀 -->
    <div class="planet planet-jupiter"></div>
    <div class="planet planet-saturn"></div>
    <div class="planet planet-mars"></div>
    <div class="planet planet-venus"></div>
    <div class="planet planet-neptune"></div>

    <!-- 流星 -->
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>

    <!-- 主布局 -->
    <div class="container">

        <!-- 左侧面板 -->
        <div class="left-panel">

            <!-- 问候 -->
            <div class="card greeting-card">
                <div class="avatar-ring">
                    <img src="./touxiang.png" alt="头像">
                </div>
                <h1>༺心༒幻༻</h1>
                <p>✦ 星际旅者 ✦</p>
                <div class="tagline">◈ 心怨逝水空余念,幻悔残云不向阳 ◈</div>
            </div>

            <!-- 时钟 -->
            <div class="card clock-card">
                <div class="clock-time" id="clockDisplay">00:00:00</div>
                <div class="clock-date" id="dateDisplay">---- · -- · --</div>
                <div class="clock-seconds" id="secondsDisplay">-- UTC+8</div>
            </div>

            <!-- 日历 -->
            <div class="card calendar-card">
                <div class="calendar-header">
                    <h2 id="calendarTitle">2026 · 06</h2>
                    <div class="calendar-nav">
                        <button id="prevMonth">‹</button>
                        <button id="nextMonth">›</button>
                    </div>
                </div>
                <div class="calendar-weekdays">
                    <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                </div>
                <div class="calendar-days" id="calendarDays"></div>
            </div>

            <!-- 语录 -->
            <div class="card quote-card">
                <span class="icon">⏺</span>
                <span class="text">「 晚风晓月终相辞,安留凄婉怨人间。 」</span>
            </div>

            <!-- ★ 新增：GitHub 主页访问按钮 -->
            <div class="card github-card">
                
                <a href="https://github.com/XINHUAN-HS" target="_blank" class="github-link">
                    <span class="github-icon">⚙</span>
                    <span>GitHub 主页</span>
                    <span class="arrow">→</span>
                </a>
            </div>

        </div>

        <!-- 右侧面板 (博客) -->
        <div class="right-panel">
            <div class="card blog-card">
                <div class="blog-header">
                    <h2>✦ 随笔 ✦</h2>
                    <input type="text" id="searchInput" placeholder="🔍 搜索文章..." class="search-input" />
                </div>
                <div class="blog-body" id="blogBody">
                    <!-- 由 JS 动态渲染 -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
